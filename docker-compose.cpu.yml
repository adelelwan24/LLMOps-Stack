services:
  vllm:
    image: ${VLLM_IMAGE:-public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo:v0.20.1}
    container_name: vllm-inference-cpu
    environment:
      VLLM_CPU_KVCACHE_SPACE: ${VLLM_CPU_KVCACHE_SPACE:-4}
      VLLM_CPU_NUM_OF_RESERVED_CPU: ${VLLM_CPU_NUM_OF_RESERVED_CPU:-1}
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen2.5-0.5B}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME:-qwen-0.5b}
      - --dtype
      - ${VLLM_DTYPE:-bfloat16}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-2048}
      - --max-num-seqs
      - ${VLLM_MAX_NUM_SEQS:-2}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --enable-prefix-caching
    shm_size: ${VLLM_SHM_SIZE:-4g}
    cap_add:
      - SYS_NICE
    security_opt:
      - seccomp=unconfined
    cpus: ${VLLM_CPUS:-0}
    mem_limit: ${VLLM_MEM_LIMIT:-16g}
