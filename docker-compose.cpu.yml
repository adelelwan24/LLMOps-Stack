services:
  vllm:
    image: ${VLLM_IMAGE}
    container_name: vllm-inference-cpu
    restart: unless-stopped

    environment:
      VLLM_CPU_KVCACHE_SPACE: ${VLLM_CPU_KVCACHE_SPACE}
      VLLM_CPU_NUM_OF_RESERVED_CPU: ${VLLM_CPU_NUM_OF_RESERVED_CPU}

    command:
      - --model
      - ${MODEL_CONTAINER_DIR}
      - --served-model-name
      - ${MODEL_HF_NAME}
      - --dtype
      - ${VLLM_DTYPE}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN}
      - --max-num-seqs
      - ${VLLM_MAX_NUM_SEQS}
      - --host
      - 0.0.0.0
      - --port
      - "8000"

    shm_size: ${VLLM_SHM_SIZE}

    cap_add:
      - SYS_NICE

    security_opt:
      - seccomp=unconfined

    volumes:
      - ${MODEL_HOST_DIR}:${MODEL_CONTAINER_DIR}:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 60s
      timeout: 10s
      retries: 20
      start_period: 300s

    cpus: ${VLLM_CPUS}
    mem_limit: ${VLLM_MEM_LIMIT}

    networks:
      - llmops

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    ports:
      - "${VLLM_PORT}:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      vllm:
        condition: service_healthy
    networks:
      - llmops
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      vllm:
        condition: service_healthy
    networks:
      - llmops
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - llmops
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.0
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    networks:
      - llmops
    restart: unless-stopped

networks:
  llmops:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  mlflow_data:
