services:
  vllm:
    container_name: vllm-inference
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen2.5-0.5B}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME:-qwen-0.5b}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 10
    networks:
      - llmops
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    ports:
      - "${VLLM_PORT:-8000}:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      vllm:
        condition: service_healthy
    networks:
      - llmops
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    environment:
      VLLM_SERVED_MODEL_NAME: ${VLLM_SERVED_MODEL_NAME:-qwen-0.5b}
    volumes:
      - ./config/prometheus.yml.template:/etc/prometheus/prometheus.yml.template:ro
      - prometheus_data:/prometheus
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s|__VLLM_SERVED_MODEL_NAME__|$${VLLM_SERVED_MODEL_NAME:-qwen-0.5b}|g" \
          /etc/prometheus/prometheus.yml.template > /tmp/prometheus.yml
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --web.enable-lifecycle
    depends_on:
      vllm:
        condition: service_healthy
    networks:
      - llmops
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - llmops
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.0
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    networks:
      - llmops
    restart: unless-stopped

networks:
  llmops:
    driver: bridge

volumes:
  huggingface_cache:
  prometheus_data:
  grafana_data:
  mlflow_data:
