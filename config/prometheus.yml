global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: vllm
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    static_configs:
      - targets:
          - vllm:8000
        labels:
          service: vllm-inference
          model: qwen-4b-instruct
