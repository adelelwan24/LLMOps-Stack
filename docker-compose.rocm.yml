services:
  vllm:
    image: vllm/vllm-openai-rocm:latest
    ipc: host
    shm_size: "2gb"
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      VLLM_ROCM_USE_AITER: ${VLLM_ROCM_USE_AITER:-1}
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen2.5-0.5B}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME:-qwen-0.5b}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-4096}
