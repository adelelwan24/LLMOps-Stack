services:
  vllm:
    image: vllm/vllm-openai:latest
    ipc: host
    shm_size: "2gb"
    gpus: all
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen2.5-0.5B}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME:-qwen-0.5b}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-4096}
      - --enable-prefix-caching
